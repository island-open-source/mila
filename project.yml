name: IslandWhisper
options:
  bundleIdPrefix: io.island.whisper
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_STRICT_CONCURRENCY: minimal
    GENERATE_INFOPLIST_FILE: NO
    PRODUCT_BUNDLE_IDENTIFIER: io.island.whisper.IslandWhisper
    MARKETING_VERSION: "1.3.6"
    CURRENT_PROJECT_VERSION: "18"

packages:
  TranscriptionCore:
    path: Packages/TranscriptionCore
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    revision: 066e75a8b3e99962685d6a90cdd5293ebffd9261
    
targets:
  IslandWhisper:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: IslandWhisper
        excludes:
          - "Resources/Info.plist"
          - "Resources/IslandWhisper.entitlements"
          - "Resources/DiarizationModels"
          - "Resources/PythonRuntime"
      - path: IslandWhisper/Resources/DiarizationModels
        type: folder
        buildPhase: resources
      # PythonRuntime is produced by `make bundle-diarization`. Treated as
      # a folder reference (not a recursive source scan) so XcodeGen copies
      # the entire directory tree into Contents/Resources/PythonRuntime/.
      # The directory is .gitignored; CI is expected to fetch/build it
      # before invoking xcodebuild. If it's missing, the build proceeds
      # without bundled diarization — SpeakerDiarizer.resolvePython falls
      # back to the user-configured python automatically.
      - path: IslandWhisper/Resources/PythonRuntime
        type: folder
        buildPhase: resources
        optional: true
    resources:
      - path: IslandWhisper/Assets.xcassets
    info:
      path: IslandWhisper/Resources/Info.plist
      properties:
        CFBundleName: IslandWhisper
        CFBundleDisplayName: Island Whisper
        # Inherit from settings.MARKETING_VERSION / CURRENT_PROJECT_VERSION above
        # so a release bump only has to change those two fields. Hardcoding here
        # caused v1.2.4 to ship with build 6 instead of 7 — Sparkle's appcast
        # advertised 7 (correct), but the bundle's CFBundleVersion stayed at
        # the stale literal until the next release picked up the inheritance.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: "14.0"
        LSApplicationCategoryType: public.app-category.productivity
        NSHumanReadableCopyright: ""
        NSMicrophoneUsageDescription: "IslandWhisper needs microphone access to record audio for transcription and dictation."
        NSScreenCaptureUsageDescription: "IslandWhisper needs screen recording permission to capture audio from apps like Zoom."
        NSAppleEventsUsageDescription: "IslandWhisper uses AppleEvents to paste dictated text into the active app."
        NSSpeechRecognitionUsageDescription: "IslandWhisper transcribes locally on your Mac; no audio is sent to the cloud."
        NSPrincipalClass: NSApplication
        LSUIElement: false
        SUFeedURL: https://island-whisper-updates.internal.island.io/appcast.xml
        SUPublicEDKey: iF35blPidKUXIaLr59fJgGGdXtI8AgVNxOx5w+eTieY=
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
    entitlements:
      path: IslandWhisper/Resources/IslandWhisper.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
        com.apple.security.device.microphone: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.network.client: true
        com.apple.security.cs.allow-jit: true
        com.apple.security.cs.disable-library-validation: true
    dependencies:
      - package: TranscriptionCore
        product: TranscriptionCore
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        OTHER_LDFLAGS: "$(inherited) -framework Accelerate -framework Metal -framework MetalKit"

  IslandWhisperTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: IslandWhisperTests
    dependencies:
      - target: IslandWhisper
      - package: TranscriptionCore
        product: TranscriptionCore
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/IslandWhisper.app/Contents/MacOS/IslandWhisper"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: io.island.whisper.IslandWhisperTests

  IslandWhisperUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: IslandWhisperUITests
    dependencies:
      - target: IslandWhisper
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: io.island.whisper.IslandWhisperUITests
        TEST_TARGET_NAME: IslandWhisper
        # Match the host app's ad-hoc signing so the runner app and the
        # injected xctest bundle have the same (empty) Team ID — otherwise
        # macOS rejects the dlopen at test-time with "different Team IDs".
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: NO
