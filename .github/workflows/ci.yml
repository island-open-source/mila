name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Avoid stacking redundant runs on the same branch — newer pushes cancel
# in-flight runs of the same workflow.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          sw_vers

      - name: Install xcodegen
        run: brew install xcodegen

      # The bundled-python diarization resource needs to exist before
      # xcodegen+xcodebuild run, because the .xcodeproj references the
      # folder. Build (or restore) the bundle first. Cache key matches
      # the same one used in ios-tests.yml so a single cache entry
      # services both workflows.
      - name: Cache diarization bundle
        id: diar-bundle-cache
        uses: actions/cache@v4
        with:
          path: Mila/Resources/PythonRuntime
          key: diar-bundle-${{ runner.os }}-${{ hashFiles('scripts/build-diarization-bundle.sh') }}

      - name: Build diarization bundle (cold path only)
        if: steps.diar-bundle-cache.outputs.cache-hit != 'true'
        run: make bundle-diarization

      - name: Generate Xcode project
        run: make project

      # The macos-15 runner image ships with a stale SwiftPM artifact cache
      # that occasionally rejects fresh downloads with
      #   "whisper-...-xcframework.zip already exists in file system".
      # Wipe the caches so package resolution always starts clean.
      - name: Clear SwiftPM caches
        run: |
          rm -rf ~/Library/Caches/org.swift.swiftpm
          rm -rf ~/Library/org.swift.swiftpm
          rm -rf ~/Library/Developer/Xcode/DerivedData/SourcePackages

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild \
            -project Mila.xcodeproj \
            -scheme Mila \
            -destination 'platform=macOS' \
            -resolvePackageDependencies

      - name: Build (Debug)
        run: |
          set -o pipefail
          xcodebuild \
            -project Mila.xcodeproj \
            -scheme Mila \
            -configuration Debug \
            -derivedDataPath build \
            -destination 'platform=macOS' \
            build | xcpretty || true

      - name: Run unit tests
        # Scope to MilaTests only. UI tests can't reliably foreground on
        # hosted runners (see ios-tests.yml for the full explanation);
        # gating CI on them would mean a permanently red status, which
        # is worse than no UI-test signal at all.
        run: |
          set -o pipefail
          xcodebuild \
            -project Mila.xcodeproj \
            -scheme Mila \
            -configuration Debug \
            -derivedDataPath build \
            -destination 'platform=macOS' \
            -only-testing:MilaTests \
            test
