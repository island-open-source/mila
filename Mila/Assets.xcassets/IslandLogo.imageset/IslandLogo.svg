  <defs>
    <!-- Grayscale brand mark. Two-tone gray with distinct shades so the
         circle's horizon line stays readable at 14×14 — the previous
         `.saturation(0)` on the colored SVG collapsed both gradients to
         nearly identical mid-grays and the horizon disappeared.
         Upper crescent ("sky") = lighter; lower dome ("land") = darker. -->
    <linearGradient id="paint0_linear_5019_99065"
                    x1="16.9817" y1="5.225" x2="16.9817" y2="23.169"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D0D0D0"/>
      <stop offset="1" stop-color="#A8A8A8"/>
    </linearGradient>
    <radialGradient id="paint1_radial_5019_99065"
                    cx="0" cy="0" r="1"
                    gradientUnits="userSpaceOnUse"
                    gradientTransform="translate(16.9817 21.4106) rotate(90) scale(11.364 13.7)">
      <stop offset="0" stop-color="#7A7A7A"/>
      <stop offset="1" stop-color="#3A3A3A"/>
    </radialGradient>
  </defs>
