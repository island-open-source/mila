name: Release

# Triggered by pushing a SemVer tag (e.g. v1.0.0). Builds a Release-config
# .app, packages it into a DMG via scripts/make-dmg.sh, and attaches the
# resulting IslandWhisper-<version>.dmg to a GitHub Release.
#
# To cut a release manually from a clean tree:
#   git tag v1.2.3 && git push origin v1.2.3
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.0.0). Required when run manually."
        required: true

permissions:
  contents: write   # required to upload release assets

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION}"

      - name: Show toolchain
        run: |
          xcodebuild -version
          sw_vers

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: make project

      # The macos-15 runner image ships with a stale SwiftPM artifact cache
      # that causes `xcodebuild` to fail with
      #   "whisper-...-xcframework.zip already exists in file system"
      # before it can even resolve the WhisperBinary dependency. Wipe the
      # caches so package resolution starts from a clean state.
      - name: Clear SwiftPM caches
        run: |
          rm -rf ~/Library/Caches/org.swift.swiftpm
          rm -rf ~/Library/org.swift.swiftpm
          rm -rf ~/Library/Developer/Xcode/DerivedData/SourcePackages

      # Import the self-signed code-signing cert (a one-time-generated, never-
      # rotated identity stored in repo secrets) into a temp keychain so
      # `make-dmg.sh` can sign the release with a STABLE designated
      # requirement. macOS TCC permissions (Accessibility, mic, etc.) are
      # keyed by the cert's SHA1 fingerprint; signing every release with the
      # same cert means users keep their granted permissions across upgrades
      # instead of having to re-grant on every release.
      - name: Set up code signing
        env:
          P12_BASE64: ${{ secrets.MACOS_CODESIGN_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MACOS_CODESIGN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)
          P12_PATH="$RUNNER_TEMP/cert.p12"

          echo "$P12_BASE64" | base64 -d > "$P12_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$P12_PATH" -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security -A
          # Make the temp keychain searchable alongside the runner's defaults
          # and grant codesign access to the private key without prompting.
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | sed 's/"//g')
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm -f "$P12_PATH"

      - name: Build Release
        run: make release-build

      - name: Package DMG
        id: dmg
        env:
          CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: |
          DMG="IslandWhisper-${{ steps.version.outputs.version }}.dmg"
          ./scripts/make-dmg.sh \
            build-release/Build/Products/Release/IslandWhisper.app \
            "${DMG}" \
            "${{ steps.version.outputs.version }}"
          ls -la "${DMG}"
          echo "dmg=${DMG}" >> "$GITHUB_OUTPUT"
          # Sanity check: every release MUST be signed by our self-signed
          # identity, otherwise TCC permissions will reset for users on
          # upgrade — the entire point of the cert.
          codesign -dvvv "build-release/Build/Products/Release/IslandWhisper.app" 2>&1 | grep -E "Authority|TeamIdentifier|CDHash"

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" || true

      - name: Create GitHub Release and upload DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="${{ steps.version.outputs.tag }}"
          DMG="${{ steps.dmg.outputs.dmg }}"
          # If a release for this tag already exists (e.g. from a manual run),
          # just upload the asset to it; otherwise create a new draft release.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$DMG" --clobber
          else
            gh release create "$TAG" "$DMG" \
              --title "IslandWhisper ${{ steps.version.outputs.version }}" \
              --generate-notes
          fi
