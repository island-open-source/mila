name: Audio Loopback E2E

# CI E2E that exercises the full live-recording pipeline (VAD →
# whisper → diarizer → LiveAISession) using a fixture-injection
# seam, NOT a virtual audio device. BlackHole was unreliable on
# macos-26 runners — the driver fails to actually route audio after
# install. The injection seam (`MilaApp.injectFixtureWavIfRequested`)
# pumps a WAV through `session.onLiveSamples` at real-time 16kHz,
# which exercises every code path downstream of audio capture.
#
# Cadence: workflow_dispatch only. Whisper models (~1.5 GB) +
# Claude CLI install take a while cold; cache makes subsequent runs
# ~2 min to "test starts running".

on:
  workflow_dispatch:
    inputs:
      include_llm_summary:
        description: "Install Claude CLI + assert LLM summary too (needs ANTHROPIC_API_KEY secret)"
        type: boolean
        default: true

jobs:
  e2e:
    name: Fixture E2E (${{ matrix.language }})
    runs-on: macos-26
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: [en, he]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Pre-grant microphone TCC (defensive)
        # The fixture-injection path doesn't actually call AVAudioEngine,
        # but TCC still gates first-time launches. Pre-grant so the
        # XCUITest launch doesn't dead-end on a prompt.
        run: |
          TCC_DB="$HOME/Library/Application Support/com.apple.TCC/TCC.db"
          for client in \
              "io.island.whisper.IslandWhisper" \
              "io.island.whisper.IslandWhisperUITests.xctrunner"; do
            sqlite3 "$TCC_DB" \
              "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, indirect_object_identifier, flags, last_modified) VALUES ('kTCCServiceMicrophone', '$client', 0, 2, 4, 1, 'UNUSED', 0, strftime('%s','now'));" \
              || echo "::warning::TCC pre-grant for $client failed"
          done

      - name: Cache diarization bundle
        id: diar-bundle-cache
        uses: actions/cache@v4
        with:
          path: Mila/Resources/PythonRuntime
          key: diar-bundle-${{ runner.os }}-${{ hashFiles('scripts/build-diarization-bundle.sh') }}

      - name: Build diarization bundle (cold path only)
        if: steps.diar-bundle-cache.outputs.cache-hit != 'true'
        run: make bundle-diarization

      - name: Cache whisper models
        id: whisper-models-cache
        uses: actions/cache@v4
        with:
          # `make models` populates this directory.
          path: ~/Library/Application Support/Mila/Models
          key: whisper-models-v1-${{ runner.os }}

      - name: Download whisper models (cold path only)
        if: steps.whisper-models-cache.outputs.cache-hit != 'true'
        run: make models

      - name: Install Claude CLI (when LLM E2E requested)
        id: claude-cli
        if: ${{ github.event.inputs.include_llm_summary == 'true' || github.event.inputs.include_llm_summary == null }}
        run: |
          # Claude Code: supports ANTHROPIC_API_KEY for non-interactive
          # auth, which is what LiveAISession needs in CI.
          curl -fsSL https://claude.ai/install.sh | bash || true
          # Try common install locations.
          for p in "$HOME/.local/bin/claude" "/opt/homebrew/bin/claude" "/usr/local/bin/claude"; do
            if [ -x "$p" ]; then
              echo "claude_path=$p" >> "$GITHUB_OUTPUT"
              "$p" --version || true
              break
            fi
          done

      - name: Generate Xcode project
        run: make project

      - name: Verify whisper models on disk
        run: |
          DIR="$HOME/Library/Application Support/Mila/Models"
          echo "Models dir: $DIR"
          ls -la "$DIR" || true
          du -sh "$DIR"/* 2>/dev/null || true

      - name: Generate audio fixture (${{ matrix.language }})
        run: ./scripts/generate-audio-fixture.sh /tmp/mila-fixture-${{ matrix.language }}.wav ${{ matrix.language }}

      - name: Mark log capture start
        run: |
          date -u +"%Y-%m-%d %H:%M:%S" > /tmp/mila-log-start.txt
          cat /tmp/mila-log-start.txt

      - name: Run fixture-injection E2E (${{ matrix.language }})
        env:
          # TEST_RUNNER_ prefix → xcodebuild strips it and passes the
          # rest to the XCTest process. Without this prefix the env
          # var doesn't propagate.
          TEST_RUNNER_MILA_FIXTURE_E2E: "1"
          TEST_RUNNER_MILA_FIXTURE_WAV_PATH: /tmp/mila-fixture-${{ matrix.language }}.wav
          TEST_RUNNER_MILA_CLAUDE_PATH: ${{ steps.claude-cli.outputs.claude_path }}
          # Mila's LiveAISession reads ANTHROPIC_API_KEY indirectly
          # through the Claude CLI it shells out to.
          TEST_RUNNER_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          case "${{ matrix.language }}" in
            en) TEST="test_english_two_minute_recording_progresses" ;;
            he) TEST="test_hebrew_two_minute_recording_progresses" ;;
          esac
          xcodebuild test \
            -project Mila.xcodeproj \
            -scheme Mila \
            -destination 'platform=macOS' \
            -only-testing:MilaUITests/AudioLoopbackUITests/$TEST \
            -derivedDataPath build-uitests \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath build-uitests/loopback.xcresult

      - name: Capture VAD + LiveTranscriber + LiveSpeakerDiarizer os_log
        if: always()
        run: |
          set +e
          mkdir -p build-uitests/logs
          if [ -f /tmp/mila-log-start.txt ]; then
            START="$(cat /tmp/mila-log-start.txt)"
            /usr/bin/log show \
              --start "$START" \
              --style compact \
              --predicate '(subsystem == "io.island.whisper.IslandWhisper" AND (category == "VAD" OR category == "LiveTranscriber" OR category == "LiveSpeakerDiarizer" OR category == "RecordingSession" OR category == "MilaApp" OR category == "TranscriptionService")) OR (subsystem == "io.island.mila.Mila")' \
              > build-uitests/logs/vad-transcriber.log 2>&1
          fi
          echo "## VAD emits + diarizer intervals (${{ matrix.language }})" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -E "VAD emit utterance|LiveTranscriber utterance:|interval added|inject-fixture" \
            build-uitests/logs/vad-transcriber.log 2>/dev/null \
            | head -60 \
            >> "$GITHUB_STEP_SUMMARY" || echo "(no relevant lines)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-${{ matrix.language }}
          path: |
            build-uitests/loopback.xcresult
            build-uitests/logs
            /tmp/mila-fixture-${{ matrix.language }}.wav
          if-no-files-found: warn
