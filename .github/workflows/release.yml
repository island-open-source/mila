name: Release

# Triggered by pushing a SemVer tag (e.g. v1.0.0). Builds a Release-config
# .app, packages it into a DMG via scripts/make-dmg.sh, and attaches the
# resulting IslandWhisper-<version>.dmg to a GitHub Release.
#
# To cut a release manually from a clean tree:
#   git tag v1.2.3 && git push origin v1.2.3
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.0.0). Required when run manually."
        required: true

permissions:
  contents: write   # required to upload release assets
  id-token: write   # required for AWS OIDC role assumption (S3 upload)

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      # Gate the entire workflow to the two release captains. Tags are
      # protected at the org-ruleset level (only admins can push them), so
      # this is a belt-and-braces check: if anyone else somehow gets a tag
      # push or workflow_dispatch through, the job exits before it touches
      # signing keys, AWS creds, or the appcast.
      - name: Authorize release actor
        env:
          ACTOR: ${{ github.actor }}
        run: |
          case "$ACTOR" in
            urisland|yoavyanuka)
              echo "Release authorized for $ACTOR"
              ;;
            *)
              echo "::error::User '$ACTOR' is not authorized to cut a release. Only urisland and yoavyanuka can." >&2
              exit 1
              ;;
          esac

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          # Sparkle keys appcast entries by CFBundleVersion (the build number).
          # We read it from project.yml — the single source of truth — because
          # the source Info.plist contains the literal placeholder
          # `$(CURRENT_PROJECT_VERSION)` (it is resolved by xcodebuild at
          # build-time). Reading the unprocessed Info.plist gave us an empty
          # build number for v1.2.5, which then made Sparkle ignore the update
          # because `sparkle:version=""` does not compare as newer than `"6"`.
          BUILD=$(awk -F'"' '/^[[:space:]]+CURRENT_PROJECT_VERSION:/ {print $2; exit}' project.yml)
          if [[ -z "$BUILD" ]]; then
            echo "error: failed to extract CURRENT_PROJECT_VERSION from project.yml" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "build=${BUILD}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION} (build ${BUILD})"

      - name: Show toolchain
        run: |
          xcodebuild -version
          sw_vers

      - name: Install xcodegen
        run: brew install xcodegen

      # Speaker-diarization runtime bundle: ~150 MB of relocatable Python
      # + pyannote.audio + deps. Cached on the GitHub Actions cache so
      # subsequent releases skip the ~10 min pip install. Cache key is
      # the SHA of the build script — bump it (or the script's content)
      # to force a rebuild.
      - name: Cache diarization bundle
        id: diar-bundle-cache
        uses: actions/cache@v4
        with:
          path: IslandWhisper/Resources/PythonRuntime
          key: diar-bundle-${{ runner.os }}-${{ hashFiles('scripts/build-diarization-bundle.sh') }}

      - name: Build diarization bundle (cold path only)
        if: steps.diar-bundle-cache.outputs.cache-hit != 'true'
        run: make bundle-diarization

      - name: Generate Xcode project
        run: make project

      # The macos-15 runner image ships with a stale SwiftPM artifact cache
      # that causes `xcodebuild` to fail with
      #   "whisper-...-xcframework.zip already exists in file system"
      # before it can even resolve the WhisperBinary dependency. Wipe the
      # caches so package resolution starts from a clean state.
      - name: Clear SwiftPM caches
        run: |
          rm -rf ~/Library/Caches/org.swift.swiftpm
          rm -rf ~/Library/org.swift.swiftpm
          rm -rf ~/Library/Developer/Xcode/DerivedData/SourcePackages

      # Import the self-signed code-signing cert (a one-time-generated, never-
      # rotated identity stored in repo secrets) into a temp keychain so
      # `make-dmg.sh` can sign the release with a STABLE designated
      # requirement. macOS TCC permissions (Accessibility, mic, etc.) are
      # keyed by the cert's SHA1 fingerprint; signing every release with the
      # same cert means users keep their granted permissions across upgrades
      # instead of having to re-grant on every release.
      - name: Set up code signing
        env:
          P12_BASE64: ${{ secrets.MACOS_CODESIGN_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MACOS_CODESIGN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)
          P12_PATH="$RUNNER_TEMP/cert.p12"

          echo "$P12_BASE64" | base64 -d > "$P12_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$P12_PATH" -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security -A
          # Make the temp keychain searchable alongside the runner's defaults
          # and grant codesign access to the private key without prompting.
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | sed 's/"//g')
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm -f "$P12_PATH"

      - name: Build Release
        run: make release-build

      - name: Package DMG
        id: dmg
        env:
          CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: |
          DMG="IslandWhisper-${{ steps.version.outputs.version }}.dmg"
          ./scripts/make-dmg.sh \
            build-release/Build/Products/Release/IslandWhisper.app \
            "${DMG}" \
            "${{ steps.version.outputs.version }}"
          ls -la "${DMG}"
          echo "dmg=${DMG}" >> "$GITHUB_OUTPUT"

      - name: Package Sparkle ZIP
        id: zip
        run: |
          set -euo pipefail
          # Sparkle 2.x can handle DMG updates but the DMG path requires
          # hdiutil mount inside the sandboxed Installer.xpc service. With
          # the ~150 MB bundled Python runtime + 280 nested signed binaries
          # introduced in v1.3.5, that path fails for some users with
          # "Update Error while extracting the archive" during the mount/
          # copy phase. The ZIP path avoids hdiutil entirely — Sparkle
          # extracts in-process with libarchive — and is the format Sparkle
          # officially recommends for updates.
          #
          # We use `ditto -c -k` rather than `zip`: ditto is the macOS-aware
          # archiver that preserves extended attributes, symlinks, hard
          # links, and resource forks. zip silently drops xattrs which
          # breaks code signatures.
          APP="build-release/Build/Products/Release/IslandWhisper.app"
          ZIP="IslandWhisper-${{ steps.version.outputs.version }}.zip"
          ditto -c -k --keepParent "$APP" "$ZIP"
          ls -la "$ZIP"
          echo "zip=${ZIP}" >> "$GITHUB_OUTPUT"
          # Sanity check: every release MUST be signed by our self-signed
          # identity, otherwise TCC permissions will reset for users on
          # upgrade — the entire point of the cert. We verify the *shipped*
          # bundle (the one inside the DMG, post-make-dmg.sh re-sign), not
          # the pre-DMG xcodebuild output which is still ad-hoc by design.
          #
          # `grep -oE '/Volumes/.*$'` over the human-readable hdiutil output
          # captures the entire mount path verbatim, including any spaces in
          # the volume name (make-dmg.sh sets it to "IslandWhisper $VERSION").
          # The previous `awk '{print $NF}'` parsing only captured the trailing
          # token and looked for the app bundle on a nonexistent path.
          # (per Cursor Bugbot review on PR #1)
          MOUNT=$(hdiutil attach "${DMG}" -nobrowse -noautoopen | grep -oE '/Volumes/.*$' | tail -n1)
          if [ -z "$MOUNT" ] || [ ! -d "$MOUNT/IslandWhisper.app" ]; then
            echo "error: failed to resolve DMG mount point (got: '$MOUNT')" >&2
            exit 1
          fi
          codesign -dvvv "${MOUNT}/IslandWhisper.app" 2>&1 | grep -E "Authority|TeamIdentifier|CDHash"
          codesign -d -r- "${MOUNT}/IslandWhisper.app" 2>&1 | grep designated
          hdiutil detach "${MOUNT}" -quiet

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" || true

      - name: Configure AWS credentials (for Sparkle update server upload)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.ISLAND_WHISPER_AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sign ZIP with Sparkle EdDSA + publish to update server
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          BUCKET: island-whisper-updates
          FEED_URL_BASE: https://island-whisper-updates.internal.island.io
        run: |
          set -euo pipefail
          DMG="${{ steps.dmg.outputs.dmg }}"
          ZIP="${{ steps.zip.outputs.zip }}"
          # Sparkle's CLI tools are checked out by SPM during the release
          # build above, into the derived-data SourcePackages/artifacts/
          # tree. They are not part of the IslandWhisper.app bundle.
          SPARKLE_BIN="build-release/SourcePackages/artifacts/sparkle/Sparkle/bin"

          # `sign_update --ed-key-file -` reads the EdDSA private key from
          # stdin, computes the Ed25519 signature over the ZIP bytes, and
          # prints `sparkle:edSignature="..." length="..."` ready to drop
          # into the appcast <enclosure>. The Sparkle appcast now points
          # at the ZIP, not the DMG.
          SIG_LINE=$(printf '%s' "$SPARKLE_PRIVATE_KEY" | "$SPARKLE_BIN/sign_update" --ed-key-file - "$ZIP")
          echo "sign_update (zip) -> $SIG_LINE"
          SIG=$(printf '%s' "$SIG_LINE" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          LEN=$(printf '%s' "$SIG_LINE" | sed -n 's/.*length="\([^"]*\)".*/\1/p')
          if [ -z "$SIG" ] || [ -z "$LEN" ]; then
            echo "error: could not parse signature/length from sign_update output" >&2
            exit 1
          fi

          # Pull the live appcast (a plain object in S3); the first ever
          # release will 404, in which case update-appcast.py just initialises
          # an empty feed with the same schema.
          aws s3 cp "s3://${BUCKET}/appcast.xml" appcast.xml \
            || echo "no existing appcast — starting fresh"

          python3 scripts/update-appcast.py \
            --version "${{ steps.version.outputs.version }}" \
            --build "${{ steps.version.outputs.build }}" \
            --artifact-name "$ZIP" \
            --signature "$SIG" \
            --length "$LEN" \
            --feed-url-base "$FEED_URL_BASE" \
            --appcast-in appcast.xml \
            --appcast-out appcast.xml

          # Upload the ZIP (the artifact Sparkle downloads) before the
          # appcast so a polling client never sees a 404 between feed
          # publish and asset publish.
          aws s3 cp "$ZIP" "s3://${BUCKET}/${ZIP}" \
            --content-type application/zip

          # Upload the DMG for users who'd rather download directly. It's
          # not in the appcast — Sparkle uses the ZIP.
          aws s3 cp "$DMG" "s3://${BUCKET}/${DMG}" \
            --content-type application/octet-stream
          # Also publish under a stable "latest" name so people can link to
          # https://island-whisper-updates.internal.island.io/IslandWhisper-latest.dmg
          # and always get the newest build without infra changes (no
          # CloudFront redirect, no S3 website routing). Server-side copy
          # so we don't pay to upload twice.
          aws s3 cp "s3://${BUCKET}/${DMG}" "s3://${BUCKET}/IslandWhisper-latest.dmg" \
            --content-type application/octet-stream \
            --cache-control "max-age=300, must-revalidate" \
            --metadata "source-version=${{ steps.version.outputs.version }}" \
            --metadata-directive REPLACE
          aws s3 cp appcast.xml "s3://${BUCKET}/appcast.xml" \
            --content-type "application/xml; charset=utf-8" \
            --cache-control "max-age=300"

      - name: Create GitHub Release and upload DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="${{ steps.version.outputs.tag }}"
          DMG="${{ steps.dmg.outputs.dmg }}"
          # If a release for this tag already exists (e.g. from a manual run),
          # just upload the asset to it; otherwise create a new draft release.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$DMG" --clobber
          else
            gh release create "$TAG" "$DMG" \
              --title "IslandWhisper ${{ steps.version.outputs.version }}" \
              --generate-notes
          fi
