name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Avoid stacking redundant runs on the same branch — newer pushes cancel
# in-flight runs of the same workflow.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          sw_vers

      - name: Install xcodegen
        run: brew install xcodegen

      # The bundled-python diarization resource needs to exist before
      # xcodegen+xcodebuild run, because the .xcodeproj references the
      # folder. Build (or restore) the bundle first. Cache key matches
      # the same one used in ios-tests.yml so a single cache entry
      # services both workflows.
      - name: Cache diarization bundle
        id: diar-bundle-cache
        uses: actions/cache@v4
        with:
          path: Mila/Resources/PythonRuntime
          key: diar-bundle-${{ runner.os }}-${{ hashFiles('scripts/build-diarization-bundle.sh') }}

      - name: Build diarization bundle (cold path only)
        if: steps.diar-bundle-cache.outputs.cache-hit != 'true'
        run: make bundle-diarization

      # Cache ggml-tiny.bin + sibling ggml-tiny-encoder.mlmodelc for the
      # CoreML/ANE verification test (`WhisperEngineCoreMLTests`). Both
      # files together are ~115 MB; the cache makes the download a
      # cold-path-only cost.
      - name: Cache whisper tiny + CoreML encoder
        id: tiny-coreml-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/whisper-coreml-test
          key: whisper-tiny-coreml-v1

      - name: Download ggml-tiny + sibling -encoder.mlmodelc (cold path only)
        if: steps.tiny-coreml-cache.outputs.cache-hit != 'true'
        run: make models-coreml-tiny

      - name: Generate Xcode project
        run: make project

      # The macos-15 runner image ships with a stale SwiftPM artifact cache
      # that occasionally rejects fresh downloads with
      #   "whisper-...-xcframework.zip already exists in file system".
      # Wipe the caches so package resolution always starts clean.
      - name: Clear SwiftPM caches
        run: |
          rm -rf ~/Library/Caches/org.swift.swiftpm
          rm -rf ~/Library/org.swift.swiftpm
          rm -rf ~/Library/Developer/Xcode/DerivedData/SourcePackages

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild \
            -project Mila.xcodeproj \
            -scheme Mila \
            -destination 'platform=macOS' \
            -resolvePackageDependencies

      - name: Build (Debug)
        run: |
          set -o pipefail
          xcodebuild \
            -project Mila.xcodeproj \
            -scheme Mila \
            -configuration Debug \
            -derivedDataPath build \
            -destination 'platform=macOS' \
            build | xcpretty || true

      - name: Run unit tests
        # Scope to MilaTests only. UI tests can't reliably foreground on
        # hosted runners (see ios-tests.yml for the full explanation);
        # gating CI on them would mean a permanently red status, which
        # is worse than no UI-test signal at all.
        #
        # MILA_COREML_E2E + MILA_COREML_MODEL unblock
        # `WhisperEngineCoreMLTests`, which verifies that whisper.cpp's
        # CoreML/ANE encoder offload actually engages (asserted via
        # whisper.cpp's own init-log lines). Failing here means a code
        # path broke the CoreML wiring even though the build still
        # links CoreML.framework.
        env:
          # xcodebuild strips the `TEST_RUNNER_` prefix and forwards the
          # remainder into the test process's environment. This is the
          # reliable propagation path for both XCUITest UI tests and
          # plain unit tests — empirically, the un-prefixed pattern that
          # some other workflows in this repo use does NOT propagate
          # (the test was XCTSkip'd in the first run on this PR even
          # though the step-level env was clearly set).
          TEST_RUNNER_MILA_COREML_E2E: "1"
          TEST_RUNNER_MILA_COREML_MODEL: "/Users/runner/.cache/whisper-coreml-test/ggml-tiny.bin"
        run: |
          set -o pipefail
          # `-retry-tests-on-failure -test-iterations 3`: this heavy job
          # (build + diarization bundle + whisper download + full suite on one
          # runner) is loaded enough that the subprocess-spawning tests
          # (LLMRunner / RecordingSummarizer) and detached-Task tests
          # (prewarm) intermittently fail under contention — they pass in the
          # lighter unit-and-ui-tests job and on a good roll. Retry failed
          # tests up to 3× (early-exit on first pass) so load-induced flakes
          # don't red the build. Genuine failures still fail all 3 attempts.
          xcodebuild \
            -project Mila.xcodeproj \
            -scheme Mila \
            -configuration Debug \
            -derivedDataPath build \
            -destination 'platform=macOS' \
            -only-testing:MilaTests \
            -retry-tests-on-failure \
            -test-iterations 3 \
            test

      - name: Run What's New popup UI test (non-fatal)
        # The "What's New" pre-update popup is driven entirely by a launch
        # arg (`--ui-test-show-whats-new`) — no audio / LLM / network
        # fixtures — so it's cheap to exercise. Kept NON-FATAL (`|| true`)
        # for the same reason the unit-test step scopes out UI tests:
        # XCUITest can't reliably foreground on hosted runners, and gating
        # CI on that would mean a permanently flaky status. This still
        # surfaces signal in the logs when the runner does foreground.
        run: |
          set -o pipefail
          xcodebuild \
            -project Mila.xcodeproj \
            -scheme Mila \
            -configuration Debug \
            -derivedDataPath build \
            -destination 'platform=macOS' \
            -only-testing:MilaUITests/WhatsNewPopupUITests \
            -retry-tests-on-failure \
            -test-iterations 3 \
            test | xcpretty || true
